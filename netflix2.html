<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>
<style>
   * {
margin: 0;
padding: 0;
    }
body {
    font-family: Arial, sans-serif;
}
header{
    display: flex;
    justify-content: space-around;
    align-items: center;
}
.logo{
    font-size: 2rem;
    color: red;
    font-family: 'Monoton', cursive;
text-transform: uppercase;
}
.link-menu a{    
    text-decoration: none;
    color: black;
    margin: 0 20px;
    font-size: 1.2rem;
    text-transform: capitalize;
    margin-left: 10px;
}
input{
    
    font-size:1rem;
    border-radius:30px;
    text-align: center;
    margin-left:2rem;
    padding:10px;
    
}
button{
    padding:10px 20px;
    font-size:1rem;
    border-radius:10px;
    background-color: red;
    color:white;
    border:none;
    margin-right:50px;

}


.icon{
    font-size:2rem;
    cursor:pointer;
    display:none;
} 
/* Mobile First Responsive Design */
        @media (max-width: 768px) {
            .icon {
                display: block;
                order: 2;
            }
            .link-menu {
                order: 4;
                flex-direction: column;
                background-color: white;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                padding: 20px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
                display: none; /* Hidden by default */
                text-align: center;
                z-index: 1000;
            }
            .link-menu.active {
                display: flex; /* Show when active */
            }
            .link-menu a {
                padding: 15px 0;
                font-size: 1.4rem;
                border-bottom: 1px solid #eee;
            }
            input {
                order: 3;
                margin: 1rem 0;
                width: 70%;
            }
            button {
                order: 5;
                margin: 1rem auto;
                display: block;
            }
            header {
                flex-wrap: wrap;
                position: relative;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.6rem;
            }
            input {
                width: 90%;
            }
        }

</style>

<body>
    <header>
        <div class="logo">indigo</div>
        <div class="icon"><i class="fa fa-bars"></i>
        </div>
        <nav class="link-menu">
            <a href="">home</a>
            <a href="">about</a>
            <a href="">services</a>
        </nav>
        <input type="text" placeholder="search">
        <button>login</button>
    </header>
    <script>




const menuIcon = document .querySelector('.icon');
const  navlinks = document .querySelector('.link-menu');

menuIcon .addEventListener('click', () => {
    navLinks .classlist.toggle('active');
});


    </script>
    
</body>
</html>
