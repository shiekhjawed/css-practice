<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing: border-box;
    }
    body{
        display:flex;
        justify-content:center;
        align-items: center;
        height:100vh;
    }
    .container{
        display: flex;
        justify-content:space-between;
        align-items: center;
        height:1000vh;
        padding:300px;
        max-width:800px;
    }
    .portside{
        flex:1;

    }
    .content{
        width:400px;
        height: 400px;
        
        background:pink;
        padding:10px;
    }

    .content input{
        width:100%;
        border:1px solid grey;
        padding:15px;
        text-transform: capitalize;
        font-size: 18px;
        

    }
   .log-btn{
    width:90%;
    background:blueviolet;
    padding:18px;
    border:none;
    margin-left:20px;
    font-size:18px;

    }
    .create-btn{
        width: 80%;
        align-items: center;
        font-size:18px;
        padding:18px;
        margin-left:40px;
        background:greenyellow;
        text-transform: capitalize;
        border:none;

    }
</style>
<body>
    <div class="container">
      <div class="portside">
        <h1 style="color: blue;font-size:50px;text-align: left; ">facebook</h1>
        <p style="font-size:20px;">facebook help you connect and share <br>with the people in your life</p>
    </div>
    </div>
    <div class="content">
        <input type="text" placeholder="Email address or password"><br><br>
        <input type="password" placeholder="password"><br><br>
        <button type="submit" class="log-btn">Log in</button><br><br>
        <p style="text-align: center; text-decoration: none; color: blue;"><a href="">forgetten password?</a></p><br><br>
        <button type="submit" class="create-btn">create New Account</button><br></br>
        <hr><br>
        <p style="margin-left:30px;"><b>create a page</b> for celebrity brand or bussiness</p>


    </div>
    
</body>
</html>
